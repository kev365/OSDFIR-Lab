# OSDFIR Infrastructure Configuration

# Centralized AI Model Configuration - Configure models here only
# The ollama deployment is managed via helm/templates/ollama-deployment.yaml
# and uses these values for model configuration
ai:
  model:
    name: "qwen2.5:0.5b"
    provider: "ollama"
    server_url: "http://ollama.osdfir.svc.cluster.local:11434"
    timeouts:
      llm_request: 120        # Main LLM request timeout (seconds)
      api_timeout: 120       # Timesketch API timeout (seconds)
      http_connect: 20       # HTTP connection timeout
      http_read: 120          # HTTP read timeout (should match llm_request)
      warm_up: 120            # Model warm-up timeout
    max_input_tokens: 32768
    # max_output_tokens: 1024
    # temperature: 0.1
    # Forensic-specific system prompt
    system_prompt: |
      You are a digital forensics AI assistant. Analyze the provided data with attention to:
      - Suspicious patterns or anomalies
      - Potential indicators of compromise
      - Timeline relationships
      - Data correlation opportunities
      Provide clear, actionable insights for investigators.

# Global deployment configuration
global:
  namespace: osdfir # Kubernetes Namespace
  timesketch:
    enabled: true
  openrelik:
    enabled: true
  yeti:
    enabled: false
  hashr:
    enabled: false
  grr:
    enabled: false  # Not currently used in the lab

  # The following are managed via terraform/variables.tf:
  #   Ollama deployment (deploy_ollama)
  #   Timesketch MCP Server (deploy_timesketch_mcp)
  #   OpenRelik MCP Server (deploy_openrelik_mcp)
  #   Yeti MCP Server (deploy_yeti_mcp)

# Global Security Settings
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Global Pod security standards
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# GlobalNetwork Policies
networkPolicy:
  enabled: true

# Timesketch Configuration
# Image tags for timesketch, nginx, opensearch (+ dashboard), redis, and
# postgres all come from the upstream osdfir-infrastructure chart. We only
# override lab-specific config here (custom tarball, user creation, no OIDC)
# so a chart bump carries everything else along automatically.
#
# OpenSearch Dashboards: chart default enables it but gates deployment on
# `opensearch.selfSigned: true`. To actually run the dashboard, override both
# `opensearch.selfSigned: true` and `opensearch.dashboard.ingress: true` here
# and redeploy. selfSigned enables the OpenSearch Security Plugin + self-signed
# TLS, which changes how Timesketch connects to OpenSearch - test after enabling.
timesketch:
  config:
    override: true
    existingConfigMap: osdfir-lab-ts-configs
    createUser: true
    oidc:
      enabled: false
  securityContext:
    enabled: true

# OpenRelik Configuration
# Image tags for frontend/api/mediator/metrics/redis/postgres/prometheus all
# come from the upstream chart. We only set the LLM analyzer config and keep
# our worker catalog below.
openrelik:
  config:
    # LLM analyzer configuration (using OpenRelik chart's built-in configmap).
    # The admin/admin UI login is created post-deploy via openrelik-server's
    # admin.py (Set-OpenRelikAdmin in scripts/manage-osdfir-lab.ps1); the chart
    # is allowed to generate its own backend secret as usual.
    analyzers:
      llm:
        provider: "ollama"
        model: "gemma3:270m"
        #max_input_tokens: !!int 4096
        # max_output_tokens: !!int 2048
        # temperature: !!float 0.1
        ollama_server_url: "http://ollama.osdfir.svc.cluster.local:11434"
        system_prompt: "You are a digital forensics expert assistant."

  # OpenRelik Workers
  # =================
  # Each entry carries its own `enabled` flag alongside the deployment spec, so
  # there is ONE place to toggle a worker: flip enabled:true/false and redeploy.
  # scripts/manage-openrelik-workers.ps1 edits this file in-place and also scales
  # existing Deployments for temporary start/stop without a redeploy.
  #
  # At deploy time, scripts/manage-osdfir-lab.ps1 runs Build-WorkerOverride which
  # writes a filtered copy (only entries with enabled:true AND a non-empty image)
  # to configs/osdfir-lab-workers.generated.yaml. Helm then creates Deployments
  # only for workers that are actually enabled AND deployable.
  #
  # Fields (beyond what Helm reads):
  #   enabled      true = deploy + run | false = skip entirely
  #   description  Shown by manage-openrelik-workers.ps1 list
  #   source       "official"  - ghcr.io/openrelik/...
  #                "community" - 3rd-party publisher (see description for credit)
  #                "no-image"  - build-from-source; excluded from helm override
