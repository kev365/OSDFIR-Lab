# HashR Configuration
# Image tags managed entirely by the upstream chart.

# Yeti Configuration
# Image tags managed entirely by the upstream chart. We only override
# persistence to reuse the shared `osdfirvolume` PVC so enabling Yeti does
# not provision a separate volume.
yeti:
  persistence:
    enabled: true
    existingPVC: osdfirvolume
