# HashR Configuration
hashr:
  image:
    repository: us-docker.pkg.dev/osdfir-registry/hashr/release/hashr
    pullPolicy: IfNotPresent
    tag: v1.8.2
  postgresql:
    image:
      repository: postgres
      tag: "17.2-alpine"

# Yeti Configuration
yeti:
  persistence:
    enabled: true
    existingPVC: osdfirvolume
  frontend:
    image:
      repository: yetiplatform/yeti-frontend
      pullPolicy: IfNotPresent
      tag: 2.5.0
  api:
    image:
      repository: yetiplatform/yeti
      pullPolicy: IfNotPresent
      tag: 2.5.0
    resources:
      limits: {}
      requests: {}
  tasks:
    image:
      repository: yetiplatform/yeti
      pullPolicy: IfNotPresent
      tag: 2.5.0
  redis:
    image:
      repository: redis
      tag: "7.4.2-alpine"
  arangodb:
    image:
      repository: arangodb
      pullPolicy: IfNotPresent
      tag: "3.11.8"
